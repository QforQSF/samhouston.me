<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Records · Sam Houston</title>
  <meta name="description" content="Sam Houston's vinyl collection, pulled from Discogs."/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --ink: #0d0d0d;
      --paper: #f7f4f0;
      --accent: #cc1a2b;
      --accent2: #1a3a6b;
      --muted: #6b6560;
      --card: #edeae5;
      --accent-soft: rgba(204,26,43,0.08);
      --border: rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); font-size: 17px; line-height: 1.65; }

    nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; background: var(--paper); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 600; color: var(--ink); text-decoration: none; letter-spacing: -0.02em; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    .page { max-width: 1280px; margin: 0 auto; padding: 6rem 2rem 3rem; }

    /* ---------- Page header ---------- */
    .section-label { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    h1 { font-family: 'Fraunces', serif; font-size: clamp(2.4rem, 6vw, 4rem); font-weight: 600; letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 1.25rem; }
    h1 em { font-style: italic; color: var(--accent2); }

    /* ---------- Top stats strip ---------- */
    .stats-strip { display: flex; flex-wrap: wrap; gap: 2.5rem 3rem; padding: 1.25rem 0 1.5rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 2.5rem; }
    .stat-item { display: flex; align-items: baseline; gap: 0.7rem; }
    .stat-num { font-family: 'Fraunces', serif; font-size: 1.75rem; font-weight: 600; color: var(--ink); letter-spacing: -0.02em; line-height: 1; }
    .stat-lbl { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    /* ---------- Hero tile grid (Vizcogs-style) ---------- */
    .hero-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1.25rem; margin-bottom: 3rem; }
    .hero-tile { display: flex; flex-direction: column; text-decoration: none; color: inherit; cursor: pointer; position: relative; transition: transform 0.15s; background: none; border: none; padding: 0; text-align: left; font: inherit; }
    .hero-tile:hover { transform: translateY(-3px); }
    .hero-cover { position: relative; aspect-ratio: 1; border-radius: 4px; overflow: hidden; background: var(--card); box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 0.75rem; }
    .hero-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-cover-fallback { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.75rem; text-align: center; background: linear-gradient(135deg, #e8e3dc, #d4cec4); color: var(--muted); font-size: 0.65rem; }
    .hero-cover-fallback b { color: var(--ink); font-family: 'Fraunces', serif; font-size: 0.8rem; font-weight: 600; line-height: 1.2; display: block; margin-bottom: 0.2rem; }
    .hero-shuffle { position: absolute; top: 0.5rem; right: 0.5rem; width: 32px; height: 32px; border-radius: 50%; background: rgba(13,13,13,0.75); color: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity 0.15s, background 0.15s; z-index: 2; }
    .hero-tile:hover .hero-shuffle { opacity: 1; }
    .hero-shuffle:hover { background: var(--accent); }
    .hero-shuffle svg { width: 16px; height: 16px; }
    .hero-label { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.2rem; display: flex; align-items: center; gap: 0.4rem; }
    .hero-label .count { color: var(--muted); font-weight: 400; letter-spacing: 0.08em; }
    .hero-headline { font-family: 'Fraunces', serif; font-size: 0.92rem; font-weight: 600; line-height: 1.25; color: var(--ink); margin-bottom: 0.15rem; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .hero-sub { font-size: 0.75rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ---------- Filter + sort bar (compact horizontal) ---------- */
    .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 1rem 1.5rem; padding: 1rem 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
    .controls-left { display: flex; align-items: center; gap: 1.25rem; flex: 1; flex-wrap: wrap; }
    .result-count { font-size: 0.85rem; color: var(--muted); }
    .result-count b { color: var(--ink); font-weight: 500; }
    .active-filters { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .active-chip { font-size: 0.72rem; font-weight: 500; padding: 0.25rem 0.7rem 0.25rem 0.75rem; border-radius: 20px; background: var(--accent); color: #fff; display: inline-flex; align-items: center; gap: 0.4rem; cursor: pointer; border: none; font-family: inherit; }
    .active-chip:hover { background: var(--accent2); }
    .active-chip .x { font-size: 1rem; line-height: 1; }
    .sort-wrap { display: flex; align-items: center; gap: 0.5rem; font-size: 0.72rem; color: var(--muted); }
    .sort-wrap label { font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
    .sort-wrap select { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--ink); background: var(--paper); border: 1.5px solid rgba(0,0,0,0.12); border-radius: 20px; padding: 0.3rem 0.85rem; cursor: pointer; }
    .sort-wrap select:focus { outline: none; border-color: var(--accent); }
    .clear-btn { font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.35rem 0.9rem; border-radius: 20px; background: transparent; border: 1.5px solid var(--accent); color: var(--accent); cursor: pointer; transition: all 0.15s; }
    .clear-btn:hover { background: var(--accent); color: #fff; }
    .search-wrap { position: relative; display: flex; align-items: center; min-width: 220px; }
    .search-wrap svg { position: absolute; left: 0.75rem; width: 14px; height: 14px; color: var(--muted); pointer-events: none; }
    .search-input { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: var(--ink); background: var(--paper); border: 1.5px solid rgba(0,0,0,0.12); border-radius: 20px; padding: 0.4rem 0.85rem 0.4rem 2.1rem; width: 100%; transition: border-color 0.15s; }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { outline: none; border-color: var(--accent); }
    /* Hide hero grid + filter details while a search is active */
    .page.searching .hero-grid, .page.searching details.filter-details { display: none; }

    /* Filter pill bars — collapsible to save space */
    details.filter-details { margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.25rem; }
    details.filter-details summary { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); cursor: pointer; padding: 0.5rem 0; list-style: none; display: flex; align-items: center; gap: 0.5rem; }
    details.filter-details summary::-webkit-details-marker { display: none; }
    details.filter-details summary::before { content: '＋'; color: var(--accent); font-size: 0.9rem; transition: transform 0.15s; }
    details.filter-details[open] summary::before { content: '−'; }
    details.filter-details summary:hover { color: var(--accent); }
    .filter-group { margin-top: 1rem; }
    .filter-group:first-of-type { margin-top: 0.75rem; }
    .filter-label { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; display: block; }
    .filter-buttons { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .filter-btn { font-family: 'DM Sans', sans-serif; font-size: 0.74rem; font-weight: 500; padding: 0.3rem 0.75rem; border-radius: 20px; border: 1.5px solid rgba(0,0,0,0.12); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ---------- Main dense grid ---------- */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 0.75rem; margin-bottom: 4rem; }
    .album { position: relative; aspect-ratio: 1; border-radius: 3px; overflow: hidden; background: var(--card); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; text-decoration: none; display: block; }
    .album:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .album img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .album-fallback { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.5rem; text-align: center; color: var(--muted); font-size: 0.6rem; background: linear-gradient(135deg, #e8e3dc, #d4cec4); }
    .album-fallback b { color: var(--ink); font-family: 'Fraunces', serif; font-size: 0.72rem; font-weight: 600; line-height: 1.15; margin-bottom: 0.2rem; display: block; }
    .album-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 45%, rgba(13,13,13,0.92) 100%); opacity: 0; transition: opacity 0.15s; display: flex; flex-direction: column; justify-content: flex-end; padding: 0.6rem 0.7rem; color: #fff; pointer-events: none; }
    .album:hover .album-overlay { opacity: 1; }
    .album-artist { font-size: 0.62rem; color: rgba(255,255,255,0.85); font-style: italic; font-family: 'Fraunces', serif; line-height: 1.2; }
    .album-title { font-size: 0.7rem; font-weight: 500; line-height: 1.15; margin: 0.15rem 0 0.2rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .album-year { font-size: 0.62rem; color: rgba(255,255,255,0.7); letter-spacing: 0.04em; }

    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); font-size: 0.95rem; grid-column: 1 / -1; }

    /* ---------- Charts section ---------- */
    .charts { border-top: 1px solid var(--border); padding-top: 3rem; margin-bottom: 4rem; }
    .charts h2 { font-family: 'Fraunces', serif; font-size: 1.6rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 2rem; }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; }
    .chart-card h3 { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
    #genreChart { max-height: 220px; }
    .bar-row { margin-bottom: 0.7rem; font-size: 0.8rem; }
    .bar-row-label { display: flex; justify-content: space-between; margin-bottom: 0.25rem; color: var(--muted); }
    .bar-row-label b { color: var(--ink); font-weight: 500; }
    .bar-track { height: 8px; background: rgba(0,0,0,0.06); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.4s ease; }

    footer { border-top: 1px solid var(--border); text-align: center; padding: 2rem; font-size: 0.82rem; color: var(--muted); }
    footer a { color: var(--accent); text-decoration: none; }

    /* ---------- Responsive ---------- */
    @media (max-width: 1100px) { .hero-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 820px) { .charts-grid { grid-template-columns: 1fr; gap: 2rem; } }
    @media (max-width: 640px) {
      nav { padding: 1rem; }
      .nav-links { gap: 1.2rem; }
      .page { padding: 5.5rem 1.25rem 2rem; }
      .hero-grid { grid-template-columns: repeat(2, 1fr); gap: 0.9rem; }
      .stats-strip { gap: 1.25rem 2rem; }
      .stat-num { font-size: 1.4rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 0.55rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">Sam Houston</a>
  <ul class="nav-links">
    <li><a href="/#about">About</a></li>
    <li><a href="/#writing">Writing</a></li>
    <li><a href="/#projects">Projects</a></li>
    <li><a href="/#contact">Contact</a></li>
    <li><a href="/records/" class="active">Records</a></li>
  </ul>
</nav>

<main class="page">
  <div class="section-label">Collection</div>
  <h1>On the <em>turntable</em>.</h1>

  <!-- =============== TOP STATS STRIP =============== -->
  <section class="stats-strip" id="statsStrip" aria-label="Collection stats">
    <!-- populated by JS -->
  </section>

  </section>

  <!-- =============== FILTER + SORT CONTROLS =============== -->
  <section class="controls" aria-label="Filter and sort">
    <div class="controls-left">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input type="search" class="search-input" id="searchInput" placeholder="Search artist or title…" aria-label="Search records"/>

        <option value="added-desc">Recently added</option>

  <!-- Collapsible filter pill bars -->

  <section class="charts">

      <div class="chart-card">

    </div>
  </section>
</main>

<footer><p>© 2026 Sam Houston · Data via <a href="https://www.discogs.com/user/QforQ">Discogs</a></p></footer>

<script>
/* ============================================================
   DISCOGS COLLECTION GALLERY — Vizcogs-inspired layout
   ------------------------------------------------------------
   Data comes from records/collection.json, refreshed weekly by
   the "Refresh Discogs Collection" GitHub Action. Sample fallback
   at records/sample-collection.json for first-run / local dev.

   Layout:
     - Top stats strip: Records · Artists · Decades · Year range
     - Hero tile grid: Random (shuffle) · Recent · Top Artist ·
       Top Label · Top Decade · Deepest Genre
     - Filter/sort bar + collapsible pill filters
     - Dense album grid (115px tiles)
     - Charts below (genre pie, decade bars)
   ============================================================ */

let collection = [];
let activeFilters = { genre: null, decade: null, format: null, label: null, artist: null };
let searchQuery = '';
let currentSort = 'added-desc';
let randomPick = null; // initially ISO-week seeded, shuffle button re-rolls

async function init() {
  try {
    let res = await fetch('collection.json');
    if (!res.ok) throw new Error('no collection.json');
    collection = await res.json();
  } catch (e) {
    try {
      const res = await fetch('sample-collection.json');
      collection = await res.json();
      console.info('Using sample-collection.json');
    } catch (e2) {
      console.error('Failed to load any collection data', e2);
      document.getElementById('grid').innerHTML = '<div class="empty-state">Could not load collection data.</div>';
      return;
    }
  }

  // Initial random pick seeded by ISO week so it's stable until shuffled
  randomPick = weekSeededPick();

  document.getElementById('sortSelect').addEventListener('change', (e) => {
    currentSort = e.target.value;
    applyFilters();
  });
  document.getElementById('clearFilters').addEventListener('click', () => {
    activeFilters = { genre: null, decade: null, format: null, label: null, artist: null };
    searchQuery = '';
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('.filter-btn.active').forEach(b => b.classList.remove('active'));
    applyFilters();
  });

  // Search: debounced 150ms so typing stays smooth even on big collections
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim().toLowerCase();
      applyFilters();
    }, 150);
  });

  renderStatsStrip();
  renderHeroGrid();
  renderCharts();
  buildFilters();
  applyFilters();
}

/* ---------- ISO-week-seeded initial random pick ---------- */
function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return d.getUTCFullYear() * 100 + weekNum;
}
function weekSeededPick() {
  const seed = getISOWeek(new Date());
  return collection[seed % collection.length];
}

/* ---------- Top stats strip ---------- */
function renderStatsStrip() {
  const artists = new Set(collection.map(r => r.artist));
  const years = collection.map(r => r.year).filter(Boolean);
  const minYear = Math.min(...years);
  const maxYear = Math.max(...years);
  const decades = new Set(collection.map(r => Math.floor((r.year || 0) / 10) * 10).filter(Boolean));

  document.getElementById('statsStrip').innerHTML = `
    <div class="stat-item"><span class="stat-num">${collection.length}</span><span class="stat-lbl">Records</span></div>
    <div class="stat-item"><span class="stat-num">${artists.size}</span><span class="stat-lbl">Artists</span></div>
    <div class="stat-item"><span class="stat-num">${decades.size}</span><span class="stat-lbl">Decades</span></div>
    <div class="stat-item"><span class="stat-num">${minYear}–${maxYear}</span><span class="stat-lbl">Year range</span></div>
  `;
}

/* ---------- Hero tile grid ---------- */
function renderHeroGrid() {
  const tiles = [];

  // 1. Random Pick (with shuffle) — filter by nothing, just opens Discogs on click
  tiles.push({
    key: 'random',
    label: 'Random pick',
    record: randomPick,
    filter: null, // Random tile doesn't filter — opens Discogs instead
    shuffle: true,
    count: null
  });

  // 2. Recent Pickup — most recently added
  const recent = [...collection].filter(r => r.dateAdded).sort((a, b) => b.dateAdded.localeCompare(a.dateAdded))[0];
  tiles.push({
    key: 'recent',
    label: 'Recent pickup',
    record: recent,
    filter: null,
    count: formatDateAdded(recent.dateAdded)
  });

  // 3. Top Artist
  const artistCounts = countBy(collection.map(r => r.artist));
  const topArtistName = Object.entries(artistCounts).sort((a, b) => b[1] - a[1])[0][0];
  const topArtistRecord = collection.find(r => r.artist === topArtistName);
  tiles.push({
    key: 'artist',
    label: 'Top artist',
    record: topArtistRecord,
    filter: { artist: topArtistName },
    count: `${artistCounts[topArtistName]} records`
  });

  // 4. Top Label
  const labelCounts = countBy(collection.map(r => r.label));
  const topLabelName = Object.entries(labelCounts).sort((a, b) => b[1] - a[1])[0][0];
  const topLabelRecord = collection.find(r => r.label === topLabelName);
  tiles.push({
    key: 'label',
    label: 'Top label',
    record: topLabelRecord,
    filter: { label: topLabelName },
    count: `${labelCounts[topLabelName]} releases`
  });

  // 5. Top Decade
  const decadeCounts = {};
  collection.forEach(r => {
    const d = Math.floor((r.year || 0) / 10) * 10;
    if (d) decadeCounts[d] = (decadeCounts[d] || 0) + 1;
  });
  const topDecade = Object.entries(decadeCounts).sort((a, b) => b[1] - a[1])[0][0];
  // Pick a representative cover: a random record from that decade
  const decadeRecords = collection.filter(r => Math.floor((r.year || 0) / 10) * 10 === +topDecade);
  const topDecadeRecord = decadeRecords[Math.floor(Math.random() * decadeRecords.length)];
  tiles.push({
    key: 'decade',
    label: 'Top decade',
    record: topDecadeRecord,
    filter: { decade: topDecade + 's' },
    count: `${decadeCounts[topDecade]} in ${topDecade}s`,
    displayTitle: `The ${topDecade}s`
  });

  // 6. Deepest Genre
  const genreCounts = {};
  collection.forEach(r => (r.genre || []).forEach(g => genreCounts[g] = (genreCounts[g] || 0) + 1));
  const topGenre = Object.entries(genreCounts).sort((a, b) => b[1] - a[1])[0][0];
  const genreRecords = collection.filter(r => (r.genre || []).includes(topGenre));
  const topGenreRecord = genreRecords[Math.floor(Math.random() * genreRecords.length)];
  tiles.push({
    key: 'genre',
    label: 'Deepest genre',
    record: topGenreRecord,
    filter: { genre: topGenre },
    count: `${genreCounts[topGenre]} records`,
    displayTitle: topGenre
  });

  // Render
  const container = document.getElementById('heroGrid');
  container.innerHTML = tiles.map(tile => {
    if (!tile.record) return '';
    const r = tile.record;
    const displayTitle = tile.displayTitle || r.title;
    const displaySub = tile.displayTitle
      ? `${r.artist} — ${r.title}`
      : (tile.key === 'artist' ? `${r.title}` : r.artist);
    return `
      <div class="hero-tile" data-key="${tile.key}" role="button" tabindex="0" aria-label="${escapeAttr(tile.label)}: ${escapeAttr(displayTitle)}">
        <div class="hero-cover">
          <div class="hero-cover-fallback"><b>${escapeHtml(r.title)}</b>${escapeHtml(r.artist)}</div>
          <img src="${escapeAttr(r.thumb)}" alt="" loading="lazy" onerror="this.remove();"/>
          ${tile.shuffle ? `<button class="hero-shuffle" aria-label="Shuffle random pick" data-shuffle="1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
          </button>` : ''}
        </div>
        <div class="hero-label">${escapeHtml(tile.label)}${tile.count ? `<span class="count">· ${escapeHtml(tile.count)}</span>` : ''}</div>
        <div class="hero-headline">${escapeHtml(displayTitle)}</div>
        <div class="hero-sub">${escapeHtml(displaySub)}</div>
      </div>
    `;
  }).join('');

  // Wire up click handlers
  container.querySelectorAll('.hero-tile').forEach(tileEl => {
    const key = tileEl.dataset.key;
    const tile = tiles.find(t => t.key === key);
    if (!tile) return;

    // Shuffle button (random tile only)
    const shuffleBtn = tileEl.querySelector('[data-shuffle]');
    if (shuffleBtn) {
      shuffleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        e.preventDefault();
        // Pick a new random record that's different from current
        let next;
        do { next = collection[Math.floor(Math.random() * collection.length)]; }
        while (next.id === randomPick.id && collection.length > 1);
        randomPick = next;
        renderHeroGrid();
      });
    }

    // Main tile click
    tileEl.addEventListener('click', (e) => {
      if (e.target.closest('[data-shuffle]')) return;
      if (tile.filter) {
        // Apply the filter(s) in this tile
        Object.assign(activeFilters, tile.filter);
        // Update pill button active state
        Object.entries(tile.filter).forEach(([k, v]) => {
          document.querySelectorAll(`.filter-btn[data-key="${k}"]`).forEach(b => {
            b.classList.toggle('active', b.dataset.value === v);
          });
        });
        applyFilters();
        // Scroll to the grid so the user sees the result
        document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else if (tile.record && tile.record.discogsUrl) {
        // Random/recent tiles just open Discogs
        window.open(tile.record.discogsUrl, '_blank', 'noopener');
      }
    });
    // Keyboard activation
    tileEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        tileEl.click();
      }
    });
  });
}

function formatDateAdded(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

/* ---------- Charts ---------- */
let genreChartInstance = null;
function renderCharts() {
  const genreCounts = {};
  collection.forEach(r => (r.genre || []).forEach(g => genreCounts[g] = (genreCounts[g] || 0) + 1));
  const sortedGenres = Object.entries(genreCounts).sort((a, b) => b[1] - a[1]).slice(0, 6);
  if (genreChartInstance) genreChartInstance.destroy();
  genreChartInstance = new Chart(document.getElementById('genreChart'), {
    type: 'doughnut',
    data: {
      labels: sortedGenres.map(g => g[0]),
      datasets: [{
        data: sortedGenres.map(g => g[1]),
        backgroundColor: ['#cc1a2b', '#1a3a6b', '#8b1a1a', '#6b6560', '#c99a5b', '#3a6b1a'],
        borderColor: '#f7f4f0',
        borderWidth: 2
      }]
    },
    options: {
      plugins: { legend: { position: 'right', labels: { font: { family: 'DM Sans', size: 11 }, color: '#6b6560', boxWidth: 10 } } },
      cutout: '55%'
    }
  });

  const decadeCounts = {};
  collection.forEach(r => {
    const d = Math.floor((r.year || 0) / 10) * 10;
    if (d) decadeCounts[d] = (decadeCounts[d] || 0) + 1;
  });
  const maxD = Math.max(...Object.values(decadeCounts));
  document.getElementById('decadeBars').innerHTML = Object.entries(decadeCounts)
    .sort((a, b) => a[0] - b[0])
    .map(([d, n]) => `
      <div class="bar-row">
        <div class="bar-row-label"><span>${d}s</span><b>${n}</b></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(n/maxD)*100}%"></div></div>
      </div>
    `).join('');
}

/* ---------- Filter pills ---------- */
function buildFilters() {
  const genres = unique(collection.flatMap(r => r.genre || [])).sort();
  const decades = unique(collection.map(r => Math.floor((r.year || 0) / 10) * 10 + 's').filter(d => d !== '0s')).sort();
  const formats = unique(collection.map(r => r.format)).sort();
  const labels = topN(countBy(collection.map(r => r.label)), 20);

  renderFilterGroup('genreFilters', genres, 'genre');
  renderFilterGroup('decadeFilters', decades, 'decade');
  renderFilterGroup('formatFilters', formats, 'format');
  renderFilterGroup('labelFilters', labels, 'label');
}

function topN(counts, n) {
  return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, n).map(e => e[0]);
}

function renderFilterGroup(containerId, values, key) {
  const container = document.getElementById(containerId);
  container.innerHTML = values.map(v => `<button class="filter-btn" data-key="${key}" data-value="${escapeAttr(v)}">${escapeHtml(v)}</button>`).join('');
  container.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const { key, value } = btn.dataset;
      if (activeFilters[key] === value) {
        activeFilters[key] = null;
        btn.classList.remove('active');
      } else {
        activeFilters[key] = value;
        container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      applyFilters();
    });
  });
}

/* ---------- Apply filters + sort + render ---------- */
function applyFilters() {
  const filtered = collection.filter(r => {
    if (activeFilters.genre && !(r.genre || []).includes(activeFilters.genre)) return false;
    if (activeFilters.decade) {
      const dec = Math.floor((r.year || 0) / 10) * 10 + 's';
      if (dec !== activeFilters.decade) return false;
    }
    if (activeFilters.format && r.format !== activeFilters.format) return false;
    if (activeFilters.label && r.label !== activeFilters.label) return false;
    if (activeFilters.artist && r.artist !== activeFilters.artist) return false;
    if (searchQuery) {
      const haystack = `${r.artist} ${r.title}`.toLowerCase();
      if (!haystack.includes(searchQuery)) return false;
    }
    return true;
  });
  sortRecords(filtered, currentSort);
  renderGrid(filtered);
  renderActiveChips();
  document.getElementById('resultCount').textContent = filtered.length;
  // Hide hero tiles + collapsible filters while a search is active
  document.querySelector('.page').classList.toggle('searching', !!searchQuery);
}

function sortRecords(arr, mode) {
  const primaryGenre = r => (r.genre && r.genre[0]) || 'zzz';
  const decadeOf = r => Math.floor((r.year || 0) / 10) * 10;
  const dateAdded = r => r.dateAdded || '';
  const byArtist = (a, b) => a.artist.localeCompare(b.artist, 'en', { sensitivity: 'base' });
  const byTitle = (a, b) => a.title.localeCompare(b.title, 'en', { sensitivity: 'base' });
  switch (mode) {
    case 'added-desc': arr.sort((a, b) => dateAdded(b).localeCompare(dateAdded(a)) || byArtist(a, b)); break;
    case 'added-asc':  arr.sort((a, b) => dateAdded(a).localeCompare(dateAdded(b)) || byArtist(a, b)); break;
    case 'year-desc':  arr.sort((a, b) => (b.year || 0) - (a.year || 0) || byArtist(a, b)); break;
    case 'year-asc':   arr.sort((a, b) => (a.year || 0) - (b.year || 0) || byArtist(a, b)); break;
    case 'artist-asc': arr.sort((a, b) => byArtist(a, b) || byTitle(a, b)); break;
    case 'genre-asc':  arr.sort((a, b) => primaryGenre(a).localeCompare(primaryGenre(b)) || byArtist(a, b)); break;
    case 'decade-desc':arr.sort((a, b) => decadeOf(b) - decadeOf(a) || byArtist(a, b)); break;
    case 'decade-asc': arr.sort((a, b) => decadeOf(a) - decadeOf(b) || byArtist(a, b)); break;
  }
}

/* ---------- Active-filter chips ---------- */
function renderActiveChips() {
  const container = document.getElementById('activeFilters');
  const chips = [];
  if (searchQuery) chips.push({ key: '__search', value: `“${searchQuery}”` });
  Object.entries(activeFilters).forEach(([k, v]) => {
    if (v) chips.push({ key: k, value: v });
  });
  container.innerHTML = chips.map(c => `<button class="active-chip" data-key="${c.key}" data-value="${escapeAttr(c.value)}"><span>${escapeHtml(c.value)}</span><span class="x">×</span></button>`).join('');
  container.querySelectorAll('.active-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const key = chip.dataset.key;
      if (key === '__search') {
        searchQuery = '';
        document.getElementById('searchInput').value = '';
      } else {
        activeFilters[key] = null;
        document.querySelectorAll(`.filter-btn[data-key="${key}"]`).forEach(b => b.classList.remove('active'));
      }
      applyFilters();
    });
  });
}

/* ---------- Main grid ---------- */
function renderGrid(items) {
  const grid = document.getElementById('grid');
  if (!items.length) {
    grid.innerHTML = '<div class="empty-state">No records match those filters.</div>';
    return;
  }
  grid.innerHTML = items.map(r => `
    <a class="album" href="${escapeAttr(r.discogsUrl || '#')}" target="_blank" rel="noopener" aria-label="${escapeAttr(r.artist)} — ${escapeAttr(r.title)}">
      <div class="album-fallback"><b>${escapeHtml(r.title)}</b>${escapeHtml(r.artist)}</div>
      <img src="${escapeAttr(r.thumb)}" alt="" loading="lazy" onerror="this.remove();"/>
      <div class="album-overlay">
        <span class="album-artist">${escapeHtml(r.artist)}</span>
        <span class="album-title">${escapeHtml(r.title)}</span>
        <span class="album-year">${r.year || ''}</span>
      </div>
    </a>
  `).join('');
}

/* ---------- Utilities ---------- */
function unique(arr) { return [...new Set(arr)].filter(Boolean); }
function countBy(arr) { return arr.reduce((a, v) => (a[v] = (a[v] || 0) + 1, a), {}); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s); }

init();
</script>
